name: YouTube Live Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v7

      - name: Python をセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: ライブ監視スクリプトを実行
        env:
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          HOLODEX_API_KEY: ${{ secrets.HOLODEX_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: notified.json をコミット（変更があった場合のみ）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notified.json
          git diff --cached --quiet || git commit -m "chore: update notified [skip ci]"
          git push
